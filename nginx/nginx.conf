# nginx/nginx.conf
# Балансировщик нагрузки для onlyteka.
# Распределяет запросы между двумя backend-инстансами.

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    upstream onlyteka_backend {
        # Основные серверы — Round Robin по умолчанию
        server 127.0.0.1:3000 max_fails=2 fail_timeout=30s;
        server 127.0.0.1:3001 max_fails=2 fail_timeout=30s;
        # Если нужен резервный — раскомментировать:
        # server 127.0.0.1:3002 backup;
    }

    server {
        listen 80;
        server_name localhost;

        # API + Socket.IO
        location / {
            proxy_pass http://onlyteka_backend;

            # Стандартные заголовки для проксирования
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket-апгрейд для Socket.IO
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Таймауты для долгих WebSocket-соединений
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}