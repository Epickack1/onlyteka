# client/nginx.conf
# Раздаём SPA + проксируем /api и /socket.io на backend-балансировщик.

upstream onlyteka_backend {
    server backend-1:3000 max_fails=2 fail_timeout=30s;
    server backend-2:3000 max_fails=2 fail_timeout=30s;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip-сжатие статики
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA-fallback: любой неизвестный путь — отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service Worker должен жить в корне домена и не кэшироваться
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
        try_files $uri =404;
    }

    # REST API → backend (с балансировкой round-robin)
    location /api/ {
        proxy_pass http://onlyteka_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GraphQL endpoint (практика 26)
    location /graphql {
        proxy_pass http://onlyteka_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket (socket.io) — с upgrade-заголовками
    location /socket.io/ {
        proxy_pass http://onlyteka_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
